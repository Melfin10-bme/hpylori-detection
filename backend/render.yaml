services:
  - type: web
    name: hpylori-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://your-app.netlify.app
      - key: PYTHON_VERSION
        value: 3.11
    plan: free
    autoDeploy: true